name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Build
        run: cargo build -p alacritree --release --locked

      - name: Package
        run: |
          tag="${GITHUB_REF##*/}"
          asset="alacritree-${tag}-x86_64-linux.tar.gz"
          tar -C target/release -czf "$asset" alacritree
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF##*/}" "$ASSET" --clobber
